<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppTrack</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
        }

        header {
            padding: 18px 32px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #38bdf8;
            margin-right: 12px;
        }

        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }

        .add-btn {
            padding: 6px 14px;
            background: transparent;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #94a3b8;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .add-btn:hover {
            border-color: #38bdf8;
            color: #38bdf8;
        }
        .add-btn.primary {
            background: #1e2d4a;
            border-color: #38bdf8;
            color: #38bdf8;
        }
        .add-btn.primary:hover {
            background: #2a3f6a;
        }

        .cohort-selector {
            padding: 16px 32px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid #334155;
        }

        .cohort-btn {
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: transparent;
            color: #94a3b8;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .cohort-btn.active {
            background: #1e2d4a;
            border-color: #38bdf8;
            color: #38bdf8;
        }

        .main {
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 20px 24px;
        }

        .panel-title {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 16px;
        }

        .empty-state {
            color: #64748b;
            font-size: 14px;
            text-align: center;
            padding: 32px 0;
        }

        /* cohort rows */
        .cohort-row {
            padding: 16px 0;
            border-bottom: 1px solid #334155;
            text-align: left;
        }
        .cohort-row:last-child { border-bottom: none; }
        .cohort-name {
            font-size: 14px;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 4px;
            text-align: left;
        }
        .cohort-meta {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 12px;
            text-align: left;
        }
        .stage-bars { display: flex; flex-direction: column; gap: 6px; }
        .stage-bar-wrap {
            display: grid;
            grid-template-columns: 90px 1fr 36px;
            align-items: center;
            gap: 8px;
        }
        .stage-label { font-size: 11px; color: #64748b; text-align: right; }
        .stage-bar-track {
            background: #334155;
            border-radius: 3px;
            height: 6px;
            overflow: hidden;
        }
        .stage-bar-fill {
            height: 100%;
            background: #38bdf8;
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        .stage-count { font-size: 11px; color: #64748b; }

        .cohort-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .cohort-left { display: flex; flex-direction: column; gap: 4px; }
        .first-gate { text-align: right; min-width: 70px; }
        .fg-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #64748b;
        }
        .fg-value { font-size: 24px; font-weight: 700; line-height: 1; }
        .fg-good { color: #22c55e; }
        .fg-mid  { color: #f59e0b; }
        .fg-poor { color: #ef4444; }
        .first-gate-label { color: #f8fafc; }
        .first-gate-bar { background: #fbbf24; }
        .sample-warning { color: #f59e0b; font-size: 11px; }

        /* active apps table */
        .app-header {
            display: grid;
            grid-template-columns: 1fr 1fr 120px 60px;
            padding: 0 0 8px 0;
            border-bottom: 1px solid #334155;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 8px;
        }
        .app-row {
            display: grid;
            grid-template-columns: 1fr 1fr 120px 60px;
            padding: 10px 0;
            border-bottom: 1px solid #334155;
            font-size: 13px;
            align-items: center;
            cursor: pointer;
        }
        .app-row:hover { background: #1a2030; }
        .app-row:last-child { border-bottom: none; }
        .app-company { color: #f8fafc; font-weight: 500; }
        .app-role { color: #94a3b8; }
        .app-stage { color: #38bdf8; font-size: 12px; font-weight: 500; }
        .age-green { color: #22c55e; }
        .age-yellow { color: #f59e0b; }
        .age-red { color: #ef4444; }
        .app-age { font-size: 12px; font-weight: 500; }

        /* inline expand */
        .app-expand {
            display: none;
            padding: 12px 0 16px 0;
            border-bottom: 1px solid #334155;
            gap: 12px;
            flex-direction: column;
        }
        .app-expand.open { display: flex; }
        .expand-stage-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .stage-advance-btn {
            padding: 5px 12px;
            border-radius: 5px;
            border: 1px solid #64748b;
            background: transparent;
            color: #94a3b8;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .stage-advance-btn:hover { border-color: #38bdf8; color: #38bdf8; }
        .stage-advance-btn.reject { border-color: #4a2020; color: #ef4444; }
        .stage-advance-btn.reject:hover { border-color: #ef4444; }
        .stage-advance-btn.inactive { border-color: #2a2a2a; color: #64748b; }
        .stage-advance-btn.inactive:hover { border-color: #64748b; color: #94a3b8; }
        .expand-inputs { display: flex; gap: 8px; align-items: center; }
        .expand-note {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 6px 10px;
            color: #f8fafc;
            font-size: 12px;
            outline: none;
        }
        .expand-note:focus { border-color: #38bdf8; }
        .expand-date {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 6px 10px;
            color: #f8fafc;
            font-size: 12px;
            outline: none;
            width: 140px;
        }
        .expand-date:focus { border-color: #38bdf8; }
        .expand-current-stage { font-size: 11px; color: #64748b; margin-bottom: 4px; }
        .expand-current-stage span { color: #38bdf8; font-weight: 600; }

        /* modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-overlay.hidden { display: none; }
        .modal {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid #334155;
        }
        .modal-title { font-size: 14px; font-weight: 600; color: #f8fafc; }
        .modal-close {
            background: none;
            border: none;
            color: #64748b;
            font-size: 16px;
            cursor: pointer;
        }
        .modal-body {
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .field-row { display: flex; flex-direction: column; gap: 4px; }
        .field-row label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #64748b;
        }
        .field-row input,
        .field-row select,
        .field-row textarea {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 8px 12px;
            color: #f8fafc;
            font-size: 13px;
            outline: none;
            font-family: inherit;
        }
        .field-row input:focus,
        .field-row select:focus,
        .field-row textarea:focus { border-color: #38bdf8; }
        .field-row textarea { resize: vertical; min-height: 80px; }

        .field-hint {
            font-size: 11px;
            color: #64748b;
            margin-top: 2px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 16px 24px;
            border-top: 1px solid #334155;
        }
        .btn-cancel {
            padding: 7px 16px;
            background: transparent;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #94a3b8;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-submit {
            padding: 7px 16px;
            background: #1e2d4a;
            border: 1px solid #38bdf8;
            border-radius: 6px;
            color: #38bdf8;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-submit:hover { background: #2a3f6a; }



        .field-row-inline {
            display: flex;
            gap: 8px;
        }
        .field-row-inline .field-row {
            flex: 1;
        }
    </style>
</head>
<body>

<header>
    <h1>APPTRACK</h1>
    <div class="header-actions">
        <button class="add-btn" id="btn-add-resume">+ Resume</button>
        <button class="add-btn" id="btn-add-contact">+ Contact</button>
        <button class="add-btn" id="btn-add-company">+ Company</button>
        <button class="add-btn primary" id="btn-add-app">+ Application</button>
    </div>
</header>

<div class="cohort-selector">
    <button class="cohort-btn active" data-dimension="segment">Market Segment</button>
    <button class="cohort-btn" data-dimension="resumeVariant">Resume Variant</button>
    <button class="cohort-btn" data-dimension="roleType">Role Type</button>
    <button class="cohort-btn" data-dimension="channel">Channel</button>
</div>

<main class="main">
    <div class="panel">
        <div class="panel-title">Signal Health by Cohort</div>
        <div id="cohort-rows"></div>
    </div>
    <div class="panel">
        <div class="panel-title">Active Applications</div>
        <div id="active-rows"></div>
    </div>
</main>

<!-- ADD APPLICATION MODAL -->
<div id="modal-app" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">New Application</span>
            <button class="modal-close" data-close="modal-app">✕</button>
        </div>
        <div class="modal-body">
            <div class="field-row">
                <label>Company Name</label>
                <input type="text" id="app-company-name" placeholder="Select or type company name..." autocomplete="off" list="company-list" />
                <datalist id="company-list"></datalist>
            </div>
            <div id="app-company-new-fields" style="display:none">
                <div class="field-row-inline" style="margin-top:8px">
                    <div class="field-row">
                        <label>Segment</label>
                        <select id="app-segment">
                            <option value="DEFENSE">Defense</option>
                            <option value="FINTECH">Fintech</option>
                            <option value="ENTERPRISE">Enterprise</option>
                            <option value="STARTUP">Startup</option>
                            <option value="TECH">Tech</option>
                            <option value="CONSULTING">Consulting</option>
                            <option value="OTHER">Other</option>
                        </select>
                    </div>
                    <div class="field-row">
                        <label>Size</label>
                        <select id="app-size">
                            <option value="SMALL">Small</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="LARGE">Large</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="field-row">
                <label>Role Title</label>
                <input type="text" id="app-title" placeholder="Software Engineer I" />
            </div>
            <div class="field-row-inline">
                <div class="field-row">
                    <label>Role Type</label>
                    <select id="app-roletype">
                        <option value="BACKEND">Backend</option>
                        <option value="FULLSTACK">Full Stack</option>
                        <option value="PLATFORM">Platform</option>
                        <option value="DEVOPS">DevOps</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
                <div class="field-row">
                    <label>Experience Level</label>
                    <select id="app-explevel">
                        <option value="JUNIOR">Junior</option>
                        <option value="MID">Mid</option>
                        <option value="SENIOR">Senior</option>
                    </select>
                </div>
            </div>
            <div class="field-row">
                <label>Job Listing URL</label>
                <input type="text" id="app-url" placeholder="https://..." />
            </div>
            <div class="field-row">
                <label>Listing Notes</label>
                <textarea id="app-listing-notes" placeholder="Paste key requirements, tech stack, notes from the listing..."></textarea>
            </div>
            <div class="field-row">
                <label>Resume Variant</label>
                <select id="app-resume"></select>
            </div>
            <div class="field-row-inline">
                <div class="field-row">
                    <label>Source Channel</label>
                    <select id="app-channel">
                        <option value="COLD">Cold</option>
                        <option value="JOB_BOARD">Job Board</option>
                        <option value="REFERRAL">Referral</option>
                        <option value="RECRUITER_OUTREACH">Recruiter Outreach</option>
                    </select>
                </div>
                <div class="field-row">
                    <label>Referred</label>
                    <select id="app-referred">
                        <option value="false">No</option>
                        <option value="true">Yes</option>
                    </select>
                </div>
            </div>
            <div class="field-row">
                <label>Contact (optional)</label>
                <select id="app-contact">
                    <option value="">None</option>
                </select>
            </div>
            <div class="field-row">
                <label>Date Submitted</label>
                <input type="date" id="app-date" />
            </div>
            <div class="field-row">
                <label>Notes</label>
                <input type="text" id="app-notes" placeholder="Any additional notes..." />
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" data-close="modal-app">Cancel</button>
            <button class="btn-submit" id="submit-app">Save Application</button>
        </div>
    </div>
</div>

<!-- ADD COMPANY MODAL -->
<div id="modal-company" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Add Company</span>
            <button class="modal-close" data-close="modal-company">✕</button>
        </div>
        <div class="modal-body">
            <div class="field-row">
                <label>Company Name</label>
                <input type="text" id="co-name" placeholder="Lockheed Martin" />
            </div>
            <div class="field-row-inline">
                <div class="field-row">
                    <label>Segment</label>
                    <select id="co-segment">
                        <option value="DEFENSE">Defense</option>
                        <option value="FINTECH">Fintech</option>
                        <option value="ENTERPRISE">Enterprise</option>
                        <option value="STARTUP">Startup</option>
                        <option value="TECH">Tech</option>
                        <option value="CONSULTING">Consulting</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
                <div class="field-row">
                    <label>Size</label>
                    <select id="co-size">
                        <option value="SMALL">Small</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="LARGE">Large</option>
                    </select>
                </div>
            </div>
            <div class="field-row">
                <label>Notes</label>
                <textarea id="co-notes" placeholder="Prime contractor, clearance required, etc."></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" data-close="modal-company">Cancel</button>
            <button class="btn-submit" id="submit-company">Save Company</button>
        </div>
    </div>
</div>

<!-- ADD CONTACT MODAL -->
<div id="modal-contact" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Add Contact</span>
            <button class="modal-close" data-close="modal-contact">✕</button>
        </div>
        <div class="modal-body">
            <div class="field-row">
                <label>Name</label>
                <input type="text" id="ct-name" placeholder="Jane Smith" />
            </div>
            <div class="field-row">
                <label>Company</label>
                <input type="text" id="ct-company" placeholder="Company name (optional)" />
            </div>
            <div class="field-row-inline">
                <div class="field-row">
                    <label>Email</label>
                    <input type="text" id="ct-email" placeholder="jane@company.com" />
                </div>
                <div class="field-row">
                    <label>Phone</label>
                    <input type="text" id="ct-phone" placeholder="555-555-5555" />
                </div>
            </div>
            <div class="field-row">
                <label>Notes</label>
                <textarea id="ct-notes" placeholder="Recruiter, hiring manager, referral source..."></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" data-close="modal-contact">Cancel</button>
            <button class="btn-submit" id="submit-contact">Save Contact</button>
        </div>
    </div>
</div>

<!-- ADD RESUME MODAL -->
<div id="modal-resume" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Add Resume Variant</span>
            <button class="modal-close" data-close="modal-resume">✕</button>
        </div>
        <div class="modal-body">
            <div class="field-row">
                <label>Version Label</label>
                <input type="text" id="rv-label" placeholder="v3-clearance-forward" />
                <span class="field-hint">Use a short slug you can identify in charts.</span>
            </div>
            <div class="field-row">
                <label>Date Created</label>
                <input type="date" id="rv-date" />
            </div>
            <div class="field-row">
                <label>Change Summary</label>
                <textarea id="rv-summary" placeholder="What changed from the previous version and why..."></textarea>
            </div>
            <div class="field-row">
                <label>File URL (optional)</label>
                <input type="text" id="rv-url" placeholder="Google Drive link, S3 URL, etc." />
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" data-close="modal-resume">Cancel</button>
            <button class="btn-submit" id="submit-resume">Save Resume Variant</button>
        </div>
    </div>
</div>

<script>
    const API = '';
    let allApplications = [];
    let allContacts = [];
    let allResumeVariants = [];
    let activeDimension = 'segment';
    let matchedCompanyId = null;

    const DISPLAY_STAGES = [
        'RECRUITER_RESPONSE', 'RECRUITER_CALL',
        'TECHNICAL_SCREEN', 'TECHNICAL_PASS',
        'FINAL_ROUND', 'OFFER'
    ];
    const TERMINAL = ['OFFER', 'REJECTED', 'INACTIVE'];
    const STAGE_LABELS = {
        SUBMITTED: 'Applied',
        RECRUITER_RESPONSE: 'Recruiter',
        RECRUITER_CALL: 'Screen',
        TECHNICAL_SCREEN: 'Tech Screen',
        TECHNICAL_PASS: 'Tech Pass',
        FINAL_ROUND: 'Final',
        OFFER: 'Offer'
    };
    const STAGE_DATE_FIELD = {
        RECRUITER_RESPONSE: 'dateRecruiterResponse',
        RECRUITER_CALL:     'dateRecruiterCall',
        TECHNICAL_SCREEN:   'dateTechnicalScreen',
        TECHNICAL_PASS:     'dateTechnicalPass',
        FINAL_ROUND:        'dateFinalRound',
        OFFER:              'dateOffer'
    };
    const NEXT_STAGES = {
        SUBMITTED:          ['RECRUITER_RESPONSE'],
        RECRUITER_RESPONSE: ['RECRUITER_CALL'],
        RECRUITER_CALL:     ['TECHNICAL_SCREEN'],
        TECHNICAL_SCREEN:   ['TECHNICAL_PASS'],
        TECHNICAL_PASS:     ['FINAL_ROUND'],
        FINAL_ROUND:        ['OFFER']
    };

    // ─── DATA LOADING ────────────────────────────────────────────────────────

    async function loadData() {
        try {
            const res = await fetch(`${API}/api/applications`);
            allApplications = await res.json();
            render();
        } catch (e) { console.error('Failed to load applications', e); }
    }

    async function loadContacts() {
        try {
            const res = await fetch(`${API}/api/contacts`);
            allContacts = await res.json();
            const sel = document.getElementById('app-contact');
            sel.innerHTML = '<option value="">None</option>' +
                allContacts.map(c => `<option value="${c.id}">${c.name}${c.company ? ' — ' + c.company : ''}</option>`).join('');
        } catch (e) { console.error('Failed to load contacts', e); }
    }

    async function loadResumeVariants() {
        try {
            const res = await fetch(`${API}/api/resumevariants`);
            allResumeVariants = await res.json();
            const sel = document.getElementById('app-resume');
            sel.innerHTML = allResumeVariants.map(r =>
                `<option value="${r.id}">${r.versionLabel}</option>`
            ).join('');
        } catch (e) { console.error('Failed to load resume variants', e); }
    }

    // ─── COMPANY LOOKUP ───────────────────────────────────────────────────────

    let allCompanies = [];

    async function loadCompanies() {
        try {
            const res = await fetch(`${API}/api/companies`);
            allCompanies = await res.json();
            const list = document.getElementById('company-list');
            list.innerHTML = allCompanies.map(c => `<option value="${c.name}">`).join('');
        } catch (e) { console.error('Failed to load companies', e); }
    }

    document.getElementById('app-company-name').addEventListener('input', function() {
        const name = this.value.trim();
        const match = allCompanies.find(c => c.name.toLowerCase() === name.toLowerCase());
        const newFields = document.getElementById('app-company-new-fields');
        if (match) {
            matchedCompanyId = match.id;
            newFields.style.display = 'none';
        } else {
            matchedCompanyId = null;
            newFields.style.display = name.length > 1 ? 'block' : 'none';
        }
    });

    // ─── SUBMIT HANDLERS ─────────────────────────────────────────────────────

    async function submitApplication() {
        const companyName = document.getElementById('app-company-name').value.trim();
        const title = document.getElementById('app-title').value.trim();
        const dateSubmitted = document.getElementById('app-date').value;
        const resumeId = document.getElementById('app-resume').value;

        if (!companyName || !title || !dateSubmitted || !resumeId) {
            alert('Company, role title, resume variant, and date are required.');
            return;
        }

        let companyId = matchedCompanyId;

        if (!companyId) {
            const segment = document.getElementById('app-segment').value;
            const size = document.getElementById('app-size').value;
            const companyRes = await fetch(`${API}/api/companies`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: companyName, segment, size })
            });
            const company = await companyRes.json();
            companyId = company.id;
        }

        const roleType = document.getElementById('app-roletype').value;
        const experienceLevel = document.getElementById('app-explevel').value;
        const url = document.getElementById('app-url').value.trim();
        const descriptionNotes = document.getElementById('app-listing-notes').value.trim();

        const listingRes = await fetch(`${API}/api/joblistings`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                company: { id: companyId },
                title,
                roleType,
                experienceLevel,
                url: url || null,
                descriptionNotes: descriptionNotes || null,
                dateDiscovered: dateSubmitted
            })
        });
        const listing = await listingRes.json();

        const channel = document.getElementById('app-channel').value;
        const referred = document.getElementById('app-referred').value === 'true';
        const contactId = document.getElementById('app-contact').value;
        const notes = document.getElementById('app-notes').value.trim();

        await fetch(`${API}/api/applications`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                jobListing: { id: listing.id },
                resumeVariant: { id: parseInt(resumeId) },
                contact: contactId ? { id: parseInt(contactId) } : null,
                referred,
                sourceChannel: channel,
                currentStage: 'SUBMITTED',
                dateSubmitted,
                active: true,
                notes: notes || null
            })
        });

        closeModal('modal-app');
        resetAppModal();
        await loadData();
    }

    async function submitCompany() {
        const name = document.getElementById('co-name').value.trim();
        if (!name) { alert('Company name is required.'); return; }

        await fetch(`${API}/api/companies`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name,
                segment: document.getElementById('co-segment').value,
                size: document.getElementById('co-size').value,
                notes: document.getElementById('co-notes').value.trim() || null
            })
        });

        closeModal('modal-company');
        document.getElementById('co-name').value = '';
        document.getElementById('co-notes').value = '';
    }

    async function submitContact() {
        const name = document.getElementById('ct-name').value.trim();
        if (!name) { alert('Contact name is required.'); return; }

        await fetch(`${API}/api/contacts`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name,
                company: document.getElementById('ct-company').value.trim() || null,
                email: document.getElementById('ct-email').value.trim() || null,
                phone: document.getElementById('ct-phone').value.trim() || null,
                notes: document.getElementById('ct-notes').value.trim() || null
            })
        });

        closeModal('modal-contact');
        document.getElementById('ct-name').value = '';
        document.getElementById('ct-company').value = '';
        document.getElementById('ct-email').value = '';
        document.getElementById('ct-phone').value = '';
        document.getElementById('ct-notes').value = '';
        await loadContacts();
    }

    async function submitResume() {
        const label = document.getElementById('rv-label').value.trim();
        if (!label) { alert('Version label is required.'); return; }

        await fetch(`${API}/api/resumevariants`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                versionLabel: label,
                dateCreated: document.getElementById('rv-date').value || null,
                changeSummary: document.getElementById('rv-summary').value.trim() || null,
                fileUrl: document.getElementById('rv-url').value.trim() || null
            })
        });

        closeModal('modal-resume');
        document.getElementById('rv-label').value = '';
        document.getElementById('rv-summary').value = '';
        document.getElementById('rv-url').value = '';
        await loadResumeVariants();
    }

    // ─── MODAL HELPERS ────────────────────────────────────────────────────────

    function openModal(id) {
        document.getElementById(id).classList.remove('hidden');
    }

    function closeModal(id) {
        document.getElementById(id).classList.add('hidden');
    }

    function resetAppModal() {
        document.getElementById('app-company-name').value = '';
        document.getElementById('app-company-new-fields').style.display = 'none';
        document.getElementById('app-title').value = '';
        document.getElementById('app-url').value = '';
        document.getElementById('app-listing-notes').value = '';
        document.getElementById('app-notes').value = '';
        document.getElementById('app-referred').value = 'false';
        document.getElementById('app-date').value = new Date().toISOString().split('T')[0];
        matchedCompanyId = null;
    }

    // wire close buttons generically
    document.querySelectorAll('[data-close]').forEach(btn => {
        btn.addEventListener('click', () => closeModal(btn.dataset.close));
    });

    // wire open buttons
    document.getElementById('btn-add-app').addEventListener('click', () => {
        document.getElementById('app-date').value = new Date().toISOString().split('T')[0];
        openModal('modal-app');
    });
    document.getElementById('btn-add-company').addEventListener('click', () => openModal('modal-company'));
    document.getElementById('btn-add-contact').addEventListener('click', () => openModal('modal-contact'));
    document.getElementById('btn-add-resume').addEventListener('click', () => {
        document.getElementById('rv-date').value = new Date().toISOString().split('T')[0];
        openModal('modal-resume');
    });

    // wire submit buttons
    document.getElementById('submit-app').addEventListener('click', submitApplication);
    document.getElementById('submit-company').addEventListener('click', submitCompany);
    document.getElementById('submit-contact').addEventListener('click', submitContact);
    document.getElementById('submit-resume').addEventListener('click', submitResume);

    // ─── STAGE TRANSITIONS ────────────────────────────────────────────────────

    let expandedAppId = null;

    async function transitionStage(appId, stage) {
        event.stopPropagation();
        const btn = event.target;
        btn.textContent = '...';
        btn.disabled = true;

        const noteEl = document.getElementById(`note-${appId}`);
        const dateEl = document.getElementById(`date-${appId}`);

        await fetch(`${API}/api/applications/${appId}/stage`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                stage,
                notes: noteEl ? noteEl.value.trim() : '',
                date: dateEl ? dateEl.value : ''
            })
        });

        expandedAppId = null;
        await loadData();
    }

    function toggleExpand(appId) {
        expandedAppId = expandedAppId === appId ? null : appId;
        renderActive();
    }

    // ─── RENDER ───────────────────────────────────────────────────────────────

    function getDimensionValue(app) {
        switch (activeDimension) {
            case 'segment':       return app.jobListing?.company?.segment ?? 'UNKNOWN';
            case 'resumeVariant': return app.resumeVariant?.versionLabel ?? 'UNKNOWN';
            case 'roleType':      return app.jobListing?.roleType ?? 'UNKNOWN';
            case 'channel':       return app.sourceChannel ?? 'UNKNOWN';
            default:              return 'UNKNOWN';
        }
    }

    function groupByCohort(apps) {
        const groups = {};
        apps.forEach(app => {
            const key = getDimensionValue(app);
            if (!groups[key]) groups[key] = [];
            groups[key].push(app);
        });
        return groups;
    }

    function passedGate(app, stage) {
        return app[STAGE_DATE_FIELD[stage]] != null;
    }

    function getFirstGateRate(apps) {
        return Math.round((apps.filter(a => passedGate(a, 'RECRUITER_RESPONSE')).length / apps.length) * 100);
    }

    function getLowSampleWarning(total) {
        if (total < 10) return '⚠ low sample';
        if (total < 15) return '~ moderate sample';
        return null;
    }

    function render() {
        renderCohorts();
        renderActive();
    }

    function renderCohorts() {
        const container = document.getElementById('cohort-rows');
        if (!allApplications.length) {
            container.innerHTML = '<div class="empty-state">No application data yet</div>';
            return;
        }

        const groups = groupByCohort(allApplications);

        container.innerHTML = Object.entries(groups).map(([cohort, apps]) => {
            const total = apps.length;
            const firstGateRate = getFirstGateRate(apps);
            const warning = getLowSampleWarning(total);
            const firstGateClass = firstGateRate >= 30 ? 'fg-good' : firstGateRate >= 15 ? 'fg-mid' : 'fg-poor';

            const bars = DISPLAY_STAGES.map(stage => {
                const count = apps.filter(a => passedGate(a, stage)).length;
                const pct = Math.round((count / total) * 100);
                const isFirstGate = stage === 'RECRUITER_RESPONSE';
                return `
                <div class="stage-bar-wrap" title="${STAGE_LABELS[stage]}: ${count} of ${total} (${pct}%)">
                    <div class="stage-label ${isFirstGate ? 'first-gate-label' : ''}">${STAGE_LABELS[stage]}</div>
                    <div class="stage-bar-track">
                        <div class="stage-bar-fill ${isFirstGate ? 'first-gate-bar' : ''}" style="width:${Math.max(pct,1)}%"></div>
                    </div>
                    <div class="stage-count">${pct}%</div>
                </div>`;
            }).join('');

            return `
            <div class="cohort-row">
                <div class="cohort-header">
                    <div class="cohort-left">
                        <div class="cohort-name">${cohort}</div>
                        <div class="cohort-meta">${total} application${total !== 1 ? 's' : ''}${warning ? ' &nbsp;<span class="sample-warning">' + warning + '</span>' : ''}</div>
                    </div>
                    <div class="first-gate ${firstGateClass}">
                        <div class="fg-label">1st gate</div>
                        <div class="fg-value">${firstGateRate}%</div>
                    </div>
                </div>
                <div class="stage-bars">${bars}</div>
            </div>`;
        }).join('');
    }

    function renderActive() {
        const container = document.getElementById('active-rows');
        const active = allApplications.filter(a => !TERMINAL.includes(a.currentStage));

        if (!active.length) {
            container.innerHTML = '<div class="empty-state">No active applications</div>';
            return;
        }

        const today = new Date();
        const todayStr = today.toISOString().split('T')[0];

        const rows = active
            .sort((a, b) => new Date(b.dateSubmitted) - new Date(a.dateSubmitted))
            .map(app => {
                const company = app.jobListing?.company?.name ?? 'Unknown';
                const role = app.jobListing?.title ?? 'Unknown Role';
                const stage = STAGE_LABELS[app.currentStage] ?? app.currentStage;
                const submitted = app.dateSubmitted ? new Date(app.dateSubmitted) : null;
                const daysAgo = submitted ? Math.floor((today - submitted) / 86400000) : null;
                const ageClass = daysAgo === null ? '' : daysAgo > 21 ? 'age-red' : daysAgo > 10 ? 'age-yellow' : 'age-green';
                const isExpanded = expandedAppId === app.id;
                const nextStages = NEXT_STAGES[app.currentStage] ?? [];

                const advanceBtns = nextStages.map(s =>
                    `<button class="stage-advance-btn" onclick="transitionStage(${app.id},'${s}')">→ ${STAGE_LABELS[s] ?? s}</button>`
                ).join('');

                return `
                <div class="app-row" onclick="toggleExpand(${app.id})">
                    <div class="app-company">${company}</div>
                    <div class="app-role">${role}</div>
                    <div class="app-stage">${stage}</div>
                    <div class="app-age ${ageClass}">${daysAgo !== null ? daysAgo + 'd' : '—'}</div>
                </div>
                <div class="app-expand ${isExpanded ? 'open' : ''}">
                    <div class="expand-current-stage">Current stage: <span>${stage}</span></div>
                    <div class="expand-inputs">
                        <input class="expand-note" id="note-${app.id}" type="text" placeholder="Quick note (optional)" />
                        <input class="expand-date" id="date-${app.id}" type="date" value="${todayStr}" />
                    </div>
                    <div class="expand-stage-btns">
                        ${advanceBtns}
                        <button class="stage-advance-btn reject" onclick="transitionStage(${app.id},'REJECTED')">✕ Rejected</button>
                        <button class="stage-advance-btn inactive" onclick="transitionStage(${app.id},'INACTIVE')">— Inactive</button>
                    </div>
                </div>`;
            }).join('');

        container.innerHTML = `
        <div class="app-header">
            <span>Company</span><span>Role</span><span>Stage</span><span>Age</span>
        </div>${rows}`;
    }

    // ─── COHORT BUTTONS ───────────────────────────────────────────────────────

    document.querySelectorAll('.cohort-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.cohort-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeDimension = btn.dataset.dimension;
            render();
        });
    });

    // ─── INIT ─────────────────────────────────────────────────────────────────

    loadCompanies();
    loadResumeVariants();
    loadContacts();
    loadData();

</script>
</body>
</html>
