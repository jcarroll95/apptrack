<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppTrack</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f1117;
            color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
        }

        header {
            padding: 24px 32px;
            border-bottom: 1px solid #1e2535;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #7c9ef8;
        }

        .cohort-selector {
            padding: 20px 32px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid #1e2535;
        }

        .cohort-btn {
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid #1e2535;
            background: transparent;
            color: #94a3b8;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .cohort-btn.active {
            background: #1e2d4a;
            border-color: #7c9ef8;
            color: #7c9ef8;
        }

        .main {
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel {
            background: #161b27;
            border: 1px solid #1e2535;
            border-radius: 10px;
            padding: 20px 24px;
        }

        .panel-title {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #4a5568;
            margin-bottom: 16px;
        }

        .empty-state {
            color: #4a5568;
            font-size: 14px;
            text-align: center;
            padding: 32px 0;
        }

        .cohort-row {
            padding: 16px 0;
            border-bottom: 1px solid #1e2535;
            text-align: left
        }
        .cohort-row:last-child { border-bottom: none; }

        .cohort-name {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 4px;
            text-align: left
        }
        .cohort-meta {
            font-size: 12px;
            color: #4a5568;
            margin-bottom: 12px;
            text-align: left;
        }
        .stage-bars {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .stage-bar-wrap {
            display: grid;
            grid-template-columns: 90px 1fr 36px;
            align-items: center;
            gap: 8px;
        }
        .stage-label {
            font-size: 11px;
            color: #4a5568;
            text-align: right;
        }
        .stage-bar-track {
            background: #1e2535;
            border-radius: 3px;
            height: 6px;
            overflow: hidden;
        }
        .stage-bar-fill {
            height: 100%;
            background: #7c9ef8;
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        .stage-count {
            font-size: 11px;
            color: #4a5568;
        }
        .app-header {
            display: grid;
            grid-template-columns: 1fr 1fr 120px 60px;
            padding: 0 0 8px 0;
            border-bottom: 1px solid #1e2535;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #4a5568;
            margin-bottom: 8px;
        }
        .app-row {
            display: grid;
            grid-template-columns: 1fr 1fr 120px 60px;
            padding: 10px 0;
            border-bottom: 1px solid #1e2535;
            font-size: 13px;
            align-items: center;
        }
        .app-row:last-child { border-bottom: none; }
        .app-company { color: #e2e8f0; font-weight: 500; }
        .app-role { color: #94a3b8; }
        .app-stage {
            color: #7c9ef8;
            font-size: 12px;
            font-weight: 500;
        }
        .age-green { color: #4ade80; }
        .age-yellow { color: #facc15; }
        .age-red { color: #f87171; }
        .app-age { font-size: 12px; font-weight: 500; }

        .cohort-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .cohort-left { display: flex; flex-direction: column; gap: 4px; }
        .first-gate {
            text-align: right;
            min-width: 70px;
        }
        .fg-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #4a5568;
        }
        .fg-value {
            font-size: 24px;
            font-weight: 700;
            line-height: 1;
        }
        .fg-good { color: #4ade80; }
        .fg-mid  { color: #facc15; }
        .fg-poor { color: #f87171; }
        .first-gate-label { color: #e2e8f0; }
        .first-gate-bar { background: #a78bfa; }
        .sample-warning {
            color: #facc15;
            font-size: 11px;
        }
        .add-btn {
            margin-left: auto;
            padding: 7px 16px;
            background: #1e2d4a;
            border: 1px solid #7c9ef8;
            border-radius: 6px;
            color: #7c9ef8;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .add-btn:hover {
            background: #2a3f6a;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-overlay.hidden { display: none; }
        .modal {
            background: #161b27;
            border: 1px solid #1e2535;
            border-radius: 10px;
            width: 480px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid #1e2535;
        }
        .modal-title {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
        }
        .modal-close {
            background: none;
            border: none;
            color: #4a5568;
            font-size: 16px;
            cursor: pointer;
        }
        .modal-body {
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .field-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .field-row label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #4a5568;
        }
        .field-row input,
        .field-row select {
            background: #0f1117;
            border: 1px solid #1e2535;
            border-radius: 6px;
            padding: 8px 12px;
            color: #e2e8f0;
            font-size: 13px;
            outline: none;
        }
        .field-row input:focus,
        .field-row select:focus {
            border-color: #7c9ef8;
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 16px 24px;
            border-top: 1px solid #1e2535;
        }
        .btn-cancel {
            padding: 7px 16px;
            background: transparent;
            border: 1px solid #1e2535;
            border-radius: 6px;
            color: #94a3b8;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-submit {
            padding: 7px 16px;
            background: #1e2d4a;
            border: 1px solid #7c9ef8;
            border-radius: 6px;
            color: #7c9ef8;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-submit:hover { background: #2a3f6a; }

        .app-row {
            cursor: pointer;
        }
        .app-row:hover {
            background: #1a2030;
        }
        .app-expand {
            display: none;
            padding: 12px 0 16px 0;
            border-bottom: 1px solid #1e2535;
            gap: 12px;
            flex-direction: column;
        }
        .app-expand.open {
            display: flex;
        }
        .expand-stage-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .stage-advance-btn {
            padding: 5px 12px;
            border-radius: 5px;
            border: 1px solid #4a5568;
            background: transparent;
            color: #94a3b8;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .stage-advance-btn:hover {
            border-color: #7c9ef8;
            color: #7c9ef8;
        }
        .stage-advance-btn.reject {
            border-color: #4a2020;
            color: #f87171;
        }
        .stage-advance-btn.reject:hover {
            border-color: #f87171;
        }
        .stage-advance-btn.inactive {
            border-color: #2a2a2a;
            color: #4a5568;
        }
        .stage-advance-btn.inactive:hover {
            border-color: #4a5568;
            color: #94a3b8;
        }
        .expand-inputs {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .expand-note {
            flex: 1;
            background: #0f1117;
            border: 1px solid #1e2535;
            border-radius: 6px;
            padding: 6px 10px;
            color: #e2e8f0;
            font-size: 12px;
            outline: none;
        }
        .expand-note:focus {
            border-color: #7c9ef8;
        }
        .expand-date {
            background: #0f1117;
            border: 1px solid #1e2535;
            border-radius: 6px;
            padding: 6px 10px;
            color: #e2e8f0;
            font-size: 12px;
            outline: none;
            width: 140px;
        }
        .expand-date:focus {
            border-color: #7c9ef8;
        }
        .expand-current-stage {
            font-size: 11px;
            color: #4a5568;
            margin-bottom: 4px;
        }
        .expand-current-stage span {
            color: #7c9ef8;
            font-weight: 600;
        }
    </style>
</head>
<body>

<header>
    <h1>APPTRACK</h1>
    <button class="add-btn" id="add-app-btn">+ Add Application</button>
</header>

<div class="cohort-selector">
    <button class="cohort-btn active" data-dimension="segment">Market Segment</button>
    <button class="cohort-btn" data-dimension="resumeVariant">Resume Variant</button>
    <button class="cohort-btn" data-dimension="roleType">Role Type</button>
    <button class="cohort-btn" data-dimension="channel">Channel</button>
</div>

<main class="main">
    <div class="panel" id="signal-panel">
        <div class="panel-title">Signal Health by Cohort</div>
        <div id="cohort-rows"></div>
    </div>

    <div class="panel" id="active-panel">
        <div class="panel-title">Active Applications</div>
        <div id="active-rows"></div>
    </div>
</main>



<div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">New Application</span>
            <button class="modal-close" id="modal-close">✕</button>
        </div>
        <div class="modal-body">
            <div class="field-row">
                <label>Company Name</label>
                <input type="text" id="f-company" placeholder="DefenseCo-A" />
            </div>
            <div class="field-row">
                <label>Market Segment</label>
                <select id="f-segment">
                    <option value="DEFENSE">Defense</option>
                    <option value="FINTECH">Fintech</option>
                    <option value="ENTERPRISE">Enterprise</option>
                    <option value="STARTUP">Startup</option>
                    <option value="TECH">Tech</option>
                    <option value="CONSULTING">Consulting</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>
            <div class="field-row">
                <label>Company Size</label>
                <select id="f-size">
                    <option value="SMALL">Small</option>
                    <option value="MID">Mid</option>
                    <option value="LARGE">Large</option>
                </select>
            </div>
            <div class="field-row">
                <label>Role Title</label>
                <input type="text" id="f-title" placeholder="Software Engineer I" />
            </div>
            <div class="field-row">
                <label>Role Type</label>
                <select id="f-roletype">
                    <option value="BACKEND">Backend</option>
                    <option value="FULLSTACK">Full Stack</option>
                    <option value="PLATFORM">Platform</option>
                    <option value="DEVOPS">DevOps</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>
            <div class="field-row">
                <label>Resume Variant</label>
                <select id="f-resume"></select>
            </div>
            <div class="field-row">
                <label>Source Channel</label>
                <select id="f-channel">
                    <option value="COLD">Cold</option>
                    <option value="JOB_BOARD">Job Board</option>
                    <option value="REFERRAL">Referral</option>
                    <option value="RECRUITER_OUTREACH">Recruiter Outreach</option>
                </select>
            </div>
            <div class="field-row">
                <label>Referred</label>
                <select id="f-referred">
                    <option value="false">No</option>
                    <option value="true">Yes</option>
                </select>
            </div>
            <div class="field-row">
                <label>Date Submitted</label>
                <input type="date" id="f-date" />
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" id="modal-cancel">Cancel</button>
            <button class="btn-submit" id="modal-submit">Save Application</button>
        </div>
    </div>
</div>

<script>
    const API = '';
    let allApplications = [];
    let activeDimension = 'segment';

    const DISPLAY_STAGES = [
        'RECRUITER_RESPONSE',
        'RECRUITER_CALL',
        'TECHNICAL_SCREEN',
        'TECHNICAL_PASS',
        'FINAL_ROUND',
        'OFFER'
    ];

    const TERMINAL = ['OFFER', 'REJECTED', 'INACTIVE'];

    const STAGE_LABELS = {
        SUBMITTED: 'Applied',
        RECRUITER_RESPONSE: 'Recruiter',
        RECRUITER_CALL: 'Screen',
        TECHNICAL_SCREEN: 'Tech Screen',
        TECHNICAL_PASS: 'Tech Pass',
        FINAL_ROUND: 'Final',
        OFFER: 'Offer'
    };

    const STAGE_DATE_FIELD = {
        RECRUITER_RESPONSE: 'dateRecruiterResponse',
        RECRUITER_CALL:     'dateRecruiterCall',
        TECHNICAL_SCREEN:   'dateTechnicalScreen',
        TECHNICAL_PASS:     'dateTechnicalPass',
        FINAL_ROUND:        'dateFinalRound',
        OFFER:              'dateOffer'
    };

    async function loadData() {
        try {
            const res = await fetch(`${API}/api/applications`);
            allApplications = await res.json();
            render();
        } catch (e) {
            console.error('Failed to load applications', e);
        }
    }

    function getDimensionValue(app) {
        switch (activeDimension) {
            case 'segment':       return app.jobListing?.company?.segment ?? 'UNKNOWN';
            case 'resumeVariant': return app.resumeVariant?.versionLabel ?? 'UNKNOWN';
            case 'roleType':      return app.jobListing?.roleType ?? 'UNKNOWN';
            case 'channel':       return app.sourceChannel ?? 'UNKNOWN';
            default:              return 'UNKNOWN';
        }
    }

    function groupByCohort(apps) {
        const groups = {};
        apps.forEach(app => {
            const key = getDimensionValue(app);
            if (!groups[key]) groups[key] = [];
            groups[key].push(app);
        });
        return groups;
    }

    function passedGate(app, stage) {
        const field = STAGE_DATE_FIELD[stage];
        return app[field] != null;
    }

    function getFirstGateRate(apps) {
        const passed = apps.filter(a => passedGate(a, 'RECRUITER_RESPONSE')).length;
        return Math.round((passed / apps.length) * 100);
    }

    function getLowSampleWarning(total) {
        if (total < 10) return '⚠ low sample';
        if (total < 15) return '~ moderate sample';
        return null;
    }

    function render() {
        renderCohorts();
        renderActive();
    }

    function renderCohorts() {
        const container = document.getElementById('cohort-rows');
        if (allApplications.length === 0) {
            container.innerHTML = '<div class="empty-state">No application data yet</div>';
            return;
        }

        const groups = groupByCohort(allApplications);

        const rows = Object.entries(groups).map(([cohort, apps]) => {
            const total = apps.length;
            const firstGateRate = getFirstGateRate(apps);
            const warning = getLowSampleWarning(total);

            const firstGateClass = firstGateRate >= 30 ? 'fg-good'
                : firstGateRate >= 15 ? 'fg-mid'
                    : 'fg-poor';

            const bars = DISPLAY_STAGES.map(stage => {
                const count = apps.filter(a => passedGate(a, stage)).length;
                const pct = Math.round((count / total) * 100);
                const width = Math.max(pct, 1);
                const isFirstGate = stage === 'RECRUITER_RESPONSE';
                return `
                <div class="stage-bar-wrap" title="${STAGE_LABELS[stage]}: ${count} of ${total} (${pct}%)">
                    <div class="stage-label ${isFirstGate ? 'first-gate-label' : ''}">${STAGE_LABELS[stage]}</div>
                    <div class="stage-bar-track">
                        <div class="stage-bar-fill ${isFirstGate ? 'first-gate-bar' : ''}" style="width:${width}%"></div>
                    </div>
                    <div class="stage-count">${pct}%</div>
                </div>`;
            }).join('');

            return `
            <div class="cohort-row">
                <div class="cohort-header">
                    <div class="cohort-left">
                        <div class="cohort-name">${cohort}</div>
                        <div class="cohort-meta">${total} application${total !== 1 ? 's' : ''}${warning ? ' &nbsp;<span class="sample-warning">' + warning + '</span>' : ''}</div>
                    </div>
                    <div class="first-gate ${firstGateClass}">
                        <div class="fg-label">1st gate</div>
                        <div class="fg-value">${firstGateRate}%</div>
                    </div>
                </div>
                <div class="stage-bars">${bars}</div>
            </div>`;
        }).join('');

        container.innerHTML = rows;
    }

    const NEXT_STAGES = {
        SUBMITTED:          ['RECRUITER_RESPONSE'],
        RECRUITER_RESPONSE: ['RECRUITER_CALL'],
        RECRUITER_CALL:     ['TECHNICAL_SCREEN'],
        TECHNICAL_SCREEN:   ['TECHNICAL_PASS'],
        TECHNICAL_PASS:     ['FINAL_ROUND'],
        FINAL_ROUND:        ['OFFER']
    };

    let expandedAppId = null;

    async function transitionStage(appId, stage) {
        const noteEl = document.getElementById(`note-${appId}`);
        const dateEl = document.getElementById(`date-${appId}`);
        const notes = noteEl ? noteEl.value.trim() : '';
        const date = dateEl ? dateEl.value : '';

        // prevent click propagation to toggleExpand
        event.stopPropagation();

        const btn = event.target;
        const originalText = btn.textContent;
        btn.textContent = '...';
        btn.disabled = true;

        await fetch(`${API}/api/applications/${appId}/stage`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ stage, notes, date })
        });

        expandedAppId = null;
        await loadData();
    }

    function toggleExpand(appId) {
        expandedAppId = expandedAppId === appId ? null : appId;
        renderActive();
    }

    function renderActive() {
        const container = document.getElementById('active-rows');
        const active = allApplications.filter(a => !TERMINAL.includes(a.currentStage));

        if (active.length === 0) {
            container.innerHTML = '<div class="empty-state">No active applications</div>';
            return;
        }

        const today = new Date();
        const todayStr = today.toISOString().split('T')[0];

        const rows = active
            .sort((a, b) => new Date(b.dateSubmitted) - new Date(a.dateSubmitted))
            .map(app => {
                const company = app.jobListing?.company?.name ?? 'Unknown';
                const role = app.jobListing?.title ?? 'Unknown Role';
                const stage = STAGE_LABELS[app.currentStage] ?? app.currentStage;
                const submitted = app.dateSubmitted ? new Date(app.dateSubmitted) : null;
                const daysAgo = submitted
                    ? Math.floor((today - submitted) / (1000 * 60 * 60 * 24))
                    : null;

                const ageClass = daysAgo === null ? ''
                    : daysAgo > 21 ? 'age-red'
                        : daysAgo > 10 ? 'age-yellow'
                            : 'age-green';

                const isExpanded = expandedAppId === app.id;
                const nextStages = NEXT_STAGES[app.currentStage] ?? [];

                const advanceBtns = nextStages.map(s =>
                    `<button class="stage-advance-btn" onclick="transitionStage(${app.id}, '${s}')"
                    >→ ${STAGE_LABELS[s] ?? s}</button>`
                ).join('');

                const expandSection = `
                <div class="app-expand ${isExpanded ? 'open' : ''}" id="expand-${app.id}">
                    <div class="expand-current-stage">Current stage: <span>${stage}</span></div>
                    <div class="expand-inputs">
                        <input class="expand-note" id="note-${app.id}" type="text" placeholder="Quick note (optional)" />
                        <input class="expand-date" id="date-${app.id}" type="date" value="${todayStr}" />
                    </div>
                    <div class="expand-stage-btns">
                        ${advanceBtns}
                        <button class="stage-advance-btn reject" onclick="transitionStage(${app.id}, 'REJECTED')">✕ Rejected</button>
                        <button class="stage-advance-btn inactive" onclick="transitionStage(${app.id}, 'INACTIVE')">— Inactive</button>
                    </div>
                </div>`;

                return `
                <div class="app-row" onclick="toggleExpand(${app.id})">
                    <div class="app-company">${company}</div>
                    <div class="app-role">${role}</div>
                    <div class="app-stage">${stage}</div>
                    <div class="app-age ${ageClass}">${daysAgo !== null ? daysAgo + 'd' : '—'}</div>
                </div>
                ${expandSection}`;
            }).join('');

        container.innerHTML = `
        <div class="app-header">
            <span>Company</span><span>Role</span><span>Stage</span><span>Age</span>
        </div>
        ${rows}`;
    }

    document.querySelectorAll('.cohort-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.cohort-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeDimension = btn.dataset.dimension;
            render();
        });
    });

    let resumeVariants = [];

    async function loadResumeVariants() {
        try {
            const res = await fetch(`${API}/api/resumevariants`);
            resumeVariants = await res.json();
            const select = document.getElementById('f-resume');
            select.innerHTML = resumeVariants.map(r =>
                `<option value="${r.id}">${r.versionLabel}</option>`
            ).join('');
        } catch (e) {
            console.error('Failed to load resume variants', e);
        }
    }

    async function submitApplication() {
        const companyName = document.getElementById('f-company').value.trim();
        const segment = document.getElementById('f-segment').value;
        const size = document.getElementById('f-size').value;
        const title = document.getElementById('f-title').value.trim();
        const roleType = document.getElementById('f-roletype').value;
        const resumeId = document.getElementById('f-resume').value;
        const channel = document.getElementById('f-channel').value;
        const referred = document.getElementById('f-referred').value === 'true';
        const dateSubmitted = document.getElementById('f-date').value;

        if (!companyName || !title || !dateSubmitted) {
            alert('Company, role title, and date are required.');
            return;
        }

        // Create or find company
        const companyRes = await fetch(`${API}/api/companies`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: companyName, segment, size })
        });
        const company = await companyRes.json();

        // Create job listing
        const listingRes = await fetch(`${API}/api/joblistings`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                company: { id: company.id },
                title,
                roleType,
                experienceRequired: 'JUNIOR',
                dateDiscovered: dateSubmitted
            })
        });
        const listing = await listingRes.json();

        // Create application
        await fetch(`${API}/api/applications`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                jobListing: { id: listing.id },
                resumeVariant: { id: parseInt(resumeId) },
                referred,
                sourceChannel: channel,
                currentStage: 'SUBMITTED',
                dateSubmitted,
                active: true
            })
        });

        closeModal();
        await loadData();
    }

    function openModal() {
        document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('modal-overlay').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.add('hidden');
    }

    document.getElementById('add-app-btn').addEventListener('click', openModal);
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    document.getElementById('modal-submit').addEventListener('click', submitApplication);

    loadResumeVariants();
    loadData();

</script>

</body>
</html>
